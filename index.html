<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euphoria: Neon Trial</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <h1 class="glitch" data-text="EUPHORIA">EUPHORIA</h1>
            <p class="tagline">NEON MEMORY ARENA</p>
        </header>

        <div class="stats-row">
            <div class="stat-item">
                <span class="label">TIME</span>
                <span id="timer" class="value">01:30</span>
            </div>
            <div class="stat-item">
                <span class="label">MATCH</span>
                <span id="score" class="value">0</span>
            </div>
        </div>

        <div class="grid" id="game-grid"></div>

        <footer>
            <a href="https://t.me/+iL-Xj34kepk1OGY1" class="tg-button">
                <span>JOIN PRIVATE ACCESS</span>
            </a>
        </footer>
    </div>

    <img src="123456.jpg" id="game-char" alt="Nate Overlay">

    <audio id="bg-music" src="Euphoria.mp3" loop></audio>

    <script src="main.js"></script>
</body>
</html>
